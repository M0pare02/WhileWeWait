<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>WordZ</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="styles/wordz.css">
</head>
<body>

  <div class="phone-shell gg-shell" style="display:flex; flex-direction:column; height:100dvh; overflow:hidden;">

    <!-- ═══ HEADER ═══════════════════════════════════════ -->
    <header class="gg-header">
      <button class="gg-back-btn" id="quitBtn" aria-label="Quit game">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="gg-header__title">WordZ</h1>
      <div class="gg-header__spacer"></div>
    </header>

    <!-- ═══ SCORE BAR ════════════════════════════════════ -->
    <div class="gg-score-bar" id="scoreBar"></div>

    <!-- ═══ ARENA (built by game.js) ═════════════════════ -->
    <div class="wz-arena" id="wzArena"></div>

    <!-- ═══ OVERLAY (round result + game over) ═══════════ -->
    <div class="td-overlay" id="wzOverlay" hidden>
      <div class="td-overlay-card" id="wzOverlayContent"></div>
    </div>

  </div>

  <script src="js/words.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/net.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
